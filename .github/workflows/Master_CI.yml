#Goal : To build the image for frontend  and push to the docker hub
name: CI
on: 
  push:
    branches: [master]
  
jobs:
  My_Frontend:
    runs-on: ubuntu-latest
     
    steps:
        #Step 1 :Clone the code/repo using actions
      - name: Checkout Code
        uses: actions/checkout@v4

        #Step 2: Setup nodeJS
      - name: Node.js Setup
        uses: actions/setup-node@v4
        with:
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend/package-lock.json
            
        #Step 2: npm package install
      - name: Install dependencies/npm install
        working-directory: frontend
        run: npm install
        

        # step 4: Run Linter / Node.js Linting
      - name: Run Linter
        run: npm run lint
        working-directory: frontend
      
        #step 5: Run Test
      - name: Run Test
        run: npm run test
        working-directory: frontend
        
        #Step 6: Login to dockerhub
      - name: Docker Setup [Login]
        uses: docker/login-action@v4
        with:
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }} 


      - name: Docker Build and Push
        uses: docker/build-push-action@v7
        with:
            context: ./frontend
            push: true
            tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-frontend:latest


            
  My_Backend:
     runs-on: ubuntu-latest
     steps:
     #step 1: Checkuout Repo
     - name: Checkout Code
       uses: actions/checkout@v4
      
     #step 2: Setup Go Environment
     - name: Setup Go Environment
       uses: actions/setup-go@v5
       
       with:
          go-version-file: 'backend/go.mod'
          cache: true
                 
     #step 3: Verify Dependencies
     - name: Verify Dependencies
       run: go mod verify
       working-directory: backend
        
     #step 4 & 5: Go linter
     - name: Run Go Formatter
       run: go fmt
       working-directory: backend

     - name: Run Go Vet
       run: go vet
       working-directory: backend

     #step 6: Test       
     - name: Run Tests
       run: go test 
       working-directory: backend
     
     #step 7: Docker Login
     - name: Docker Setup [Login]
       uses: docker/login-action@v4
       with:
         username: ${{ vars.DOCKERHUB_USERNAME }}
         password: ${{ secrets.DOCKERHUB_TOKEN }} 


      #step 8 : Build & Push image
     - name: Docker Build and Push
       uses: docker/build-push-action@v7
       with:
            context: ./backend
            push: true
            tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-backend:latest

       
       
 
