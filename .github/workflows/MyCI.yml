#Goal : To build the image for frontend  and push to the docker hub
name: CI
on: 
  push:
    branches: [master]
  
jobs:
  My_Frontend:
    runs-on: ubuntu-latest
     
    steps:
        #Step 1 :Clone the code/repo using actions
      - name: Checkout Code
        uses: actions/checkout@v4

        #Step 2: Setup nodeJS
      - name: Node.js Setup
        uses: actions/setup-node@v4
        
        #Step 2: npm package install
      - name: Install dependencies/npm install
        working-directory: devboard/frontend
        run: npm install

